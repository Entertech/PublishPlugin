name: Publish Library

on:
  workflow_call:
    inputs:
      module:
        description: "Gradle module path, for example :library"
        required: true
        type: string
      publish_target:
        description: "Publish target: central, github_packages, or all"
        required: false
        default: "github_packages"
        type: string
      namespace:
        description: "Sonatype Central namespace, for example cn.entertech"
        required: false
        default: "cn.entertech"
        type: string
      publishing_type:
        description: "Central publishing type"
        required: false
        default: "user_managed"
        type: string
      version:
        description: "Optional release version override"
        required: false
        default: ""
        type: string
      github_packages_repository:
        description: "GitHub Packages repository in owner/repo format. Blank uses the caller repository."
        required: false
        default: ""
        type: string
      github_packages_url:
        description: "Optional full GitHub Packages Maven repository URL"
        required: false
        default: ""
        type: string
      java_version:
        description: "JDK version used by Gradle"
        required: false
        default: "17"
        type: string
    secrets:
      MAVEN_CENTRAL_USERNAME:
        required: false
      MAVEN_CENTRAL_PASSWORD:
        required: false
      GPG_KEY_CONTENTS:
        required: false
      SIGNING_KEY_ID:
        required: false
      SIGNING_PASSWORD:
        required: false
      GITHUB_PACKAGES_TOKEN:
        required: false

permissions:
  contents: read
  packages: write

jobs:
  publish:
    runs-on: ubuntu-latest

    env:
      MODULE_PATH: ${{ inputs.module }}
      PUBLISH_TARGET: ${{ inputs.publish_target }}
      CENTRAL_NAMESPACE: ${{ inputs.namespace }}
      CENTRAL_PUBLISHING_TYPE: ${{ inputs.publishing_type }}
      PUBLISH_VERSION: ${{ inputs.version }}
      GITHUB_PACKAGES_REPOSITORY: ${{ inputs.github_packages_repository }}
      GITHUB_PACKAGES_URL: ${{ inputs.github_packages_url }}
      GITHUB_ACTOR: ${{ github.actor }}
      GITHUB_TOKEN: ${{ secrets.GITHUB_PACKAGES_TOKEN || github.token }}
      GITHUB_PACKAGES_TOKEN: ${{ secrets.GITHUB_PACKAGES_TOKEN || github.token }}
      CENTRAL_USERNAME: ${{ secrets.MAVEN_CENTRAL_USERNAME }}
      CENTRAL_PASSWORD: ${{ secrets.MAVEN_CENTRAL_PASSWORD }}
      MAVEN_CENTRAL_USERNAME: ${{ secrets.MAVEN_CENTRAL_USERNAME }}
      MAVEN_CENTRAL_PASSWORD: ${{ secrets.MAVEN_CENTRAL_PASSWORD }}
      GPG_KEY_CONTENTS: ${{ secrets.GPG_KEY_CONTENTS }}
      SIGNING_KEY_ID: ${{ secrets.SIGNING_KEY_ID }}
      SIGNING_PASSWORD: ${{ secrets.SIGNING_PASSWORD }}
      ORG_GRADLE_PROJECT_signingInMemoryKey: ${{ secrets.GPG_KEY_CONTENTS }}
      ORG_GRADLE_PROJECT_signingInMemoryKeyId: ${{ secrets.SIGNING_KEY_ID }}
      ORG_GRADLE_PROJECT_signingInMemoryKeyPassword: ${{ secrets.SIGNING_PASSWORD }}

    steps:
      - name: Checkout caller repository
        uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: zulu
          java-version: ${{ inputs.java_version }}

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Validate publish inputs
        shell: bash
        run: |
          set -euo pipefail

          if [[ ! "$MODULE_PATH" =~ ^(:[A-Za-z0-9_.-]+)+$ ]]; then
            echo "::error::module must be a Gradle project path like :library or :parent:library"
            exit 1
          fi

          case "$PUBLISH_TARGET" in
            central|github_packages|all) ;;
            *)
              echo "::error::publish_target must be central, github_packages, or all"
              exit 1
              ;;
          esac

          if [[ "$CENTRAL_PUBLISHING_TYPE" != "user_managed" && "$CENTRAL_PUBLISHING_TYPE" != "automatic" ]]; then
            echo "::error::publishing_type must be user_managed or automatic"
            exit 1
          fi

          if [[ "$PUBLISH_TARGET" == "central" || "$PUBLISH_TARGET" == "all" ]]; then
            required_central_env=(
              CENTRAL_USERNAME
              CENTRAL_PASSWORD
              GPG_KEY_CONTENTS
              SIGNING_PASSWORD
            )
            for name in "${required_central_env[@]}"; do
              if [[ -z "${!name:-}" ]]; then
                echo "::error::$name is required when publish_target is $PUBLISH_TARGET"
                exit 1
              fi
            done
          fi

          if [[ "$PUBLISH_TARGET" == "github_packages" || "$PUBLISH_TARGET" == "all" ]]; then
            if [[ -z "${GITHUB_TOKEN:-}" ]]; then
              echo "::error::GITHUB_TOKEN or GITHUB_PACKAGES_TOKEN is required when publish_target is $PUBLISH_TARGET"
              exit 1
            fi
          fi

      - name: Publish to GitHub Packages
        if: ${{ inputs.publish_target == 'github_packages' || inputs.publish_target == 'all' }}
        shell: bash
        run: |
          set -euo pipefail

          args=(
            "${MODULE_PATH}:PublishLibraryRemoteTask"
            "-PpublishTarget=github_packages"
            "--no-daemon"
            "--stacktrace"
          )

          if [[ -n "$GITHUB_PACKAGES_REPOSITORY" ]]; then
            args+=("-PgithubPackagesRepository=${GITHUB_PACKAGES_REPOSITORY}")
          fi

          if [[ -n "$GITHUB_PACKAGES_URL" ]]; then
            args+=("-PgithubPackagesUrl=${GITHUB_PACKAGES_URL}")
          fi

          if [[ -n "$PUBLISH_VERSION" ]]; then
            args+=("-PpublishVersion=${PUBLISH_VERSION}")
          fi

          ./gradlew "${args[@]}"

      - name: Publish to Central Portal
        if: ${{ inputs.publish_target == 'central' || inputs.publish_target == 'all' }}
        shell: bash
        run: |
          set -euo pipefail

          args=(
            "${MODULE_PATH}:PublishLibraryRemoteTask"
            "-PpublishTarget=central"
            "-PcentralNamespace=${CENTRAL_NAMESPACE}"
            "-PcentralPublishingType=${CENTRAL_PUBLISHING_TYPE}"
            "--no-daemon"
            "--stacktrace"
          )

          if [[ -n "$PUBLISH_VERSION" ]]; then
            args+=("-PpublishVersion=${PUBLISH_VERSION}")
          fi

          ./gradlew "${args[@]}"
