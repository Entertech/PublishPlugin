name: Publish Plugin To Central

on:
  push:
    branches:
      - pre_publish
  workflow_dispatch:
    inputs:
      namespace:
        description: "Sonatype Central namespace, for example cn.entertech"
        required: true
        default: "cn.entertech"
        type: string
      publishing_type:
        description: "Central publishing type"
        required: true
        default: "automatic"
        type: choice
        options:
          - automatic
          - user_managed
      publish_mode:
        description: "release publishes final artifacts; ci publishes Central snapshots without README/tag/merge."
        required: true
        default: "release"
        type: choice
        options:
          - release
          - ci

permissions:
  contents: write

concurrency:
  group: publish-plugin-central-${{ github.ref }}
  cancel-in-progress: true

jobs:
  publish:
    if: ${{ github.event_name != 'workflow_dispatch' || github.event.inputs.publish_mode != 'ci' }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve release version
        id: release
        shell: bash
        run: |
          set -euo pipefail

          if [[ "$GITHUB_REF" != "refs/heads/pre_publish" ]]; then
            echo "::error::PublishPlugin Central release must run from pre_publish. Current ref: $GITHUB_REF"
            exit 1
          fi

          git fetch --no-tags origin main

          python3 .github/scripts/ensure_publish_version.py \
            --head-file plugin_base/build.gradle.kts \
            --normalize-only \
            --write

          release_version="$(python3 - <<'PY'
          import re
          import sys
          from pathlib import Path

          content = Path("plugin_base/build.gradle.kts").read_text(encoding="utf-8")
          match = re.search(r"(?m)^\s*version\s*=\s*['\"]([^'\"]+)['\"]", content)
          if not match:
              print("::error::Cannot find plugin_base version", file=sys.stderr)
              sys.exit(1)

          version = match.group(1)
          if not re.fullmatch(r"\d+\.\d+\.\d+", version):
              print(f"::error::Publish plugin version '{version}' must use digits.digits.digits format", file=sys.stderr)
              sys.exit(1)

          print(version)
          PY
          )"
          main_file="$RUNNER_TEMP/main-plugin-build.gradle"
          if git show origin/main:plugin_base/build.gradle.kts > "$main_file" 2>/dev/null; then
            :
          elif git show origin/main:plugin_base/build.gradle > "$main_file" 2>/dev/null; then
            :
          else
            echo "::error::Cannot find main plugin_base build file"
            exit 1
          fi
          main_version="$(MAIN_FILE="$main_file" python3 - <<'PY'
          import os
          import re
          import sys
          from pathlib import Path

          content = Path(os.environ["MAIN_FILE"]).read_text(encoding="utf-8")
          match = re.search(r"(?m)^\s*version\s*=\s*['\"]([^'\"]+)['\"]", content)
          if not match:
              print("::error::Cannot find main plugin_base version", file=sys.stderr)
              sys.exit(1)

          version = match.group(1)
          if not re.fullmatch(r"\d+\.\d+\.\d+", version):
              print(f"::error::Main plugin version '{version}' must use digits.digits.digits format", file=sys.stderr)
              sys.exit(1)

          print(version)
          PY
          )"
          comparison="$(RELEASE_VERSION="$release_version" MAIN_VERSION="$main_version" python3 - <<'PY'
          import os

          def parse(value):
              return tuple(int(part) for part in value.split("."))

          release = parse(os.environ["RELEASE_VERSION"])
          main = parse(os.environ["MAIN_VERSION"])
          if release < main:
              print("lower")
          elif release == main:
              print("equal")
          else:
              print("greater")
          PY
          )"
          if [[ "$comparison" == "lower" ]]; then
            echo "::error::pre_publish version ${release_version} must not be lower than main version ${main_version}. Refusing to merge."
            exit 1
          fi

          publish_required=false
          if [[ "$comparison" == "greater" ]]; then
            publish_required=true
          fi

          release_tag="v${release_version}"
          {
            echo "version=${release_version}"
            echo "main_version=${main_version}"
            echo "tag=${release_tag}"
            echo "publish_required=${publish_required}"
          } >> "$GITHUB_OUTPUT"
          {
            echo "RELEASE_VERSION=${release_version}"
            echo "MAIN_VERSION=${main_version}"
            echo "RELEASE_TAG=${release_tag}"
            echo "PUBLISH_REQUIRED=${publish_required}"
          } >> "$GITHUB_ENV"
          if [[ "$publish_required" == "true" ]]; then
            echo "Preparing PublishPlugin ${release_version} release as ${release_tag}; main is ${main_version}."
          else
            echo "PublishPlugin ${release_version} equals main version ${main_version}; Central publish is not required."
          fi

          python3 .github/scripts/sync_readme_publish_version.py --version "$release_version"
          if ! git diff --quiet -- plugin_base/build.gradle.kts README.md; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add plugin_base/build.gradle.kts README.md
            git commit -m "[codex] Prepare PublishPlugin ${release_version} release [skip ci]"
          fi

      - name: Preflight main merge
        id: merge_preflight
        shell: bash
        run: |
          set -euo pipefail

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          release_commit="$(git rev-parse HEAD)"
          git fetch origin main pre_publish --tags

          git checkout -B __preflight_main_merge origin/main
          if ! git merge --no-commit --no-ff "$release_commit"; then
            git status --short || true
            git merge --abort || true
            echo "::error::pre_publish cannot be preflight-merged into main. Check the merge output above; if conflicts are listed, merge main into pre_publish and resolve them before publishing."
            exit 1
          fi

          git merge --abort || true
          git checkout --detach "$release_commit"
          echo "pre_publish can be merged into main without conflicts."

      - name: Check release tag
        id: release_tag
        if: steps.release.outputs.publish_required == 'true'
        shell: bash
        run: |
          set -euo pipefail

          git fetch --tags origin
          if git rev-parse -q --verify "refs/tags/${RELEASE_TAG}" >/dev/null; then
            tag_commit="$(git rev-list -n 1 "${RELEASE_TAG}")"
            head_commit="$(git rev-parse HEAD)"
            if [[ "$tag_commit" == "$head_commit" ]]; then
              echo "exists=true" >> "$GITHUB_OUTPUT"
              echo "::notice::${RELEASE_TAG} already exists on this commit; skipping Central publish."
              exit 0
            fi

            echo "::error::${RELEASE_TAG} already exists on ${tag_commit}, but HEAD is ${head_commit}. Bump plugin_base version before releasing."
            exit 1
          fi

          echo "exists=false" >> "$GITHUB_OUTPUT"

      - name: Ensure PGP public key is available
        if: steps.release.outputs.publish_required == 'true' && steps.release_tag.outputs.exists != 'true'
        env:
          GPG_KEY_CONTENTS: ${{ secrets.GPG_KEY_CONTENTS }}
        run: |
          python3 .github/scripts/ensure_pgp_public_key_available.py \
            --keyserver keyserver.ubuntu.com \
            --stable-lookups 3

      - name: Set up JDK
        if: steps.release.outputs.publish_required == 'true' && steps.release_tag.outputs.exists != 'true'
        uses: actions/setup-java@v4
        with:
          distribution: zulu
          java-version: "17"

      - name: Setup Gradle
        if: steps.release.outputs.publish_required == 'true' && steps.release_tag.outputs.exists != 'true'
        uses: gradle/actions/setup-gradle@v4

      - name: Validate local publication metadata
        if: steps.release.outputs.publish_required == 'true' && steps.release_tag.outputs.exists != 'true'
        run: |
          ./gradlew :plugin_base:build --stacktrace
          ./gradlew :plugin_base:publishToMavenLocal --stacktrace
          python3 .github/scripts/validate_publish_plugin_publications.py

      - name: Publish to Central staging
        if: steps.release.outputs.publish_required == 'true' && steps.release_tag.outputs.exists != 'true'
        env:
          CENTRAL_USERNAME: ${{ secrets.MAVEN_CENTRAL_USERNAME }}
          CENTRAL_PASSWORD: ${{ secrets.MAVEN_CENTRAL_PASSWORD }}
          GPG_KEY_CONTENTS: ${{ secrets.GPG_KEY_CONTENTS }}
          SIGNING_KEY_ID: ${{ secrets.SIGNING_KEY_ID }}
          SIGNING_PASSWORD: ${{ secrets.SIGNING_PASSWORD }}
        run: |
          original_signing_key_id="${SIGNING_KEY_ID:-}"
          eval "$(python3 .github/scripts/normalize_signing_key_id.py "$original_signing_key_id")"
          if [[ -n "$original_signing_key_id" && -z "${SIGNING_KEY_ID:-}" ]]; then
            echo "::warning::SIGNING_KEY_ID is not a valid PGP key id; falling back to infer it from GPG_KEY_CONTENTS."
          elif [[ -n "$original_signing_key_id" && "$original_signing_key_id" != "${SIGNING_KEY_ID:-}" ]]; then
            echo "::notice::SIGNING_KEY_ID was normalized to a Gradle-compatible long key id."
          fi

          ./gradlew :plugin_base:publishAllPublicationsToCentralStagingRepository \
            -PcentralPublish=true \
            --no-daemon \
            --stacktrace

      - name: Create Central Portal deployment
        if: steps.release.outputs.publish_required == 'true' && steps.release_tag.outputs.exists != 'true'
        env:
          CENTRAL_NAMESPACE: ${{ github.event.inputs.namespace || 'cn.entertech' }}
          CENTRAL_PUBLISHING_TYPE: ${{ github.event.inputs.publishing_type || 'automatic' }}
          CENTRAL_USERNAME: ${{ secrets.MAVEN_CENTRAL_USERNAME }}
          CENTRAL_PASSWORD: ${{ secrets.MAVEN_CENTRAL_PASSWORD }}
        run: |
          python3 - <<'PY'
          import base64
          import os
          import sys
          import urllib.error
          import urllib.parse
          import urllib.request

          namespace = os.environ["CENTRAL_NAMESPACE"].strip()
          publishing_type = os.environ["CENTRAL_PUBLISHING_TYPE"].strip()
          username = os.environ["CENTRAL_USERNAME"].strip()
          password = os.environ["CENTRAL_PASSWORD"].strip()

          if not namespace:
              print("::error::CENTRAL_NAMESPACE is required", file=sys.stderr)
              sys.exit(1)
          if not username or not password:
              print("::error::MAVEN_CENTRAL_USERNAME and MAVEN_CENTRAL_PASSWORD secrets are required", file=sys.stderr)
              sys.exit(1)

          token = base64.b64encode(f"{username}:{password}".encode("utf-8")).decode("ascii")
          url = (
              "https://ossrh-staging-api.central.sonatype.com/manual/upload/defaultRepository/"
              f"{urllib.parse.quote(namespace)}?publishing_type={urllib.parse.quote(publishing_type)}"
          )
          request = urllib.request.Request(url, method="POST")
          request.add_header("Authorization", f"Bearer {token}")

          try:
              with urllib.request.urlopen(request, timeout=60) as response:
                  body = response.read().decode("utf-8", errors="replace")
          except urllib.error.HTTPError as error:
              body = error.read().decode("utf-8", errors="replace")
              print(f"::error::Central manual upload failed: HTTP {error.code} {body}", file=sys.stderr)
              sys.exit(1)

          if body:
              print(body)
          print("Central Portal deployments: https://central.sonatype.com/publishing/deployments")
          PY

      - name: Sync README release version
        if: steps.release.outputs.publish_required == 'true' && steps.release_tag.outputs.exists != 'true'
        shell: bash
        run: |
          set -euo pipefail

          python3 .github/scripts/sync_readme_publish_version.py \
            --version "$RELEASE_VERSION" \
            --root-build-file build.gradle.kts
          if git diff --quiet -- plugin_base/build.gradle.kts README.md build.gradle.kts; then
            echo "README.md and build.gradle.kts already document PublishPlugin ${RELEASE_VERSION}"
          else
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add plugin_base/build.gradle.kts README.md build.gradle.kts
            git commit -m "[codex] Update publish plugin usage version to ${RELEASE_VERSION} [skip ci]"
          fi

      - name: Tag successful release
        if: steps.release.outputs.publish_required == 'true' && steps.release_tag.outputs.exists != 'true'
        shell: bash
        run: |
          set -euo pipefail

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag -a "$RELEASE_TAG" -m "Release PublishPlugin ${RELEASE_VERSION}"
          git push origin "$RELEASE_TAG"

      - name: Merge pre_publish to main
        shell: bash
        run: |
          set -euo pipefail

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git fetch origin main pre_publish --tags
          if [[ "${{ steps.release.outputs.publish_required }}" == "true" ]] && ! git rev-parse -q --verify "refs/tags/${RELEASE_TAG}" >/dev/null; then
            echo "::error::${RELEASE_TAG} does not exist; refusing to update main."
            exit 1
          fi
          if [[ "${{ steps.release.outputs.publish_required }}" != "true" ]]; then
            echo "pre_publish version ${RELEASE_VERSION} equals main version ${MAIN_VERSION}; does not require Central publish; merging directly."
          fi

          release_commit="$(git rev-parse HEAD)"
          git checkout -B main origin/main
          git merge --no-ff --no-edit "$release_commit"
          git push origin main

  ci_snapshot:
    if: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.publish_mode == 'ci' }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve snapshot version
        shell: bash
        run: |
          set -euo pipefail

          base_version="$(python3 - <<'PY'
          import re
          import sys
          from pathlib import Path

          content = Path("plugin_base/build.gradle.kts").read_text(encoding="utf-8")
          match = re.search(r"(?m)^\s*version\s*=\s*['\"]([^'\"]+)['\"]", content)
          if not match:
              print("::error::Cannot find plugin_base version", file=sys.stderr)
              sys.exit(1)
          version = match.group(1)
          if not re.fullmatch(r"\d+\.\d+\.\d+(?:-SNAPSHOT)?", version):
              print(f"::error::Publish plugin version '{version}' must be semver or semver-SNAPSHOT", file=sys.stderr)
              sys.exit(1)
          print(version.removesuffix("-SNAPSHOT"))
          PY
          )"
          snapshot_version="${base_version}-SNAPSHOT"
          VERSION="$snapshot_version" python3 - <<'PY'
          import os
          import re
          from pathlib import Path

          path = Path("plugin_base/build.gradle.kts")
          version = os.environ["VERSION"]
          content = path.read_text(encoding="utf-8")
          content, count = re.subn(
              r'(?m)^(\s*version\s*=\s*["\'])([^"\']+)(["\'])',
              rf"\g<1>{version}\g<3>",
              content,
              count=1,
          )
          if count != 1:
              raise SystemExit("Cannot update plugin_base snapshot version")
          path.write_text(content, encoding="utf-8")
          PY
          echo "SNAPSHOT_VERSION=${snapshot_version}" >> "$GITHUB_ENV"
          echo "Preparing PublishPlugin snapshot ${snapshot_version}."

      - name: Ensure PGP public key is available
        env:
          GPG_KEY_CONTENTS: ${{ secrets.GPG_KEY_CONTENTS }}
        run: |
          python3 .github/scripts/ensure_pgp_public_key_available.py \
            --keyserver keyserver.ubuntu.com \
            --stable-lookups 3

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: zulu
          java-version: "17"

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Validate local publication metadata
        run: |
          ./gradlew :plugin_base:build --stacktrace
          ./gradlew :plugin_base:publishToMavenLocal --stacktrace

      - name: Publish snapshot to Central snapshots
        env:
          CENTRAL_USERNAME: ${{ secrets.MAVEN_CENTRAL_USERNAME }}
          CENTRAL_PASSWORD: ${{ secrets.MAVEN_CENTRAL_PASSWORD }}
          GPG_KEY_CONTENTS: ${{ secrets.GPG_KEY_CONTENTS }}
          SIGNING_KEY_ID: ${{ secrets.SIGNING_KEY_ID }}
          SIGNING_PASSWORD: ${{ secrets.SIGNING_PASSWORD }}
        run: |
          original_signing_key_id="${SIGNING_KEY_ID:-}"
          eval "$(python3 .github/scripts/normalize_signing_key_id.py "$original_signing_key_id")"
          if [[ -n "$original_signing_key_id" && -z "${SIGNING_KEY_ID:-}" ]]; then
            echo "::warning::SIGNING_KEY_ID is not a valid PGP key id; falling back to infer it from GPG_KEY_CONTENTS."
          elif [[ -n "$original_signing_key_id" && "$original_signing_key_id" != "${SIGNING_KEY_ID:-}" ]]; then
            echo "::notice::SIGNING_KEY_ID was normalized to a Gradle-compatible long key id."
          fi

          ./gradlew :plugin_base:publishAllPublicationsToCentralSnapshotsRepository \
            -PcentralPublish=true \
            -PcentralReleaseType=snapshot \
            --no-daemon \
            --stacktrace
